<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Conjuntos de Questões (Admin) - Francês na Mira</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --azul: #2563eb; --azul-escuro: #1e40af; --azul-claro: #eff6ff; --azul-hover: #1d4ed8;
  --cinza-50: #f8fafc; --cinza-100: #f1f5f9; --cinza-200: #e2e8f0; --cinza-300: #cbd5e1;
  --cinza-400: #94a3b8; --cinza-600: #475569; --cinza-800: #1e293b; --branco: #ffffff;
  --verde: #16a34a; --verde-bg: #f0fdf4; --amarelo: #d97706; --amarelo-bg: #fffbeb;
  --vermelho: #dc2626; --vermelho-bg: #fef2f2;
  --sombra: 0 1px 3px rgba(15,23,42,0.08), 0 8px 24px rgba(15,23,42,0.06); --radius: 16px;
}
[data-theme="dark"] {
  --branco: #1e2433; --cinza-50: #161b28; --cinza-100: #232a3b; --cinza-200: #2d3548;
  --cinza-300: #3a4358; --cinza-400: #4b5568; --cinza-600: #9aa5bd; --cinza-800: #e8ecf5;
  --azul: #3b82f6; --azul-escuro: #2563eb; --azul-claro: rgba(59,130,246,0.18); --azul-hover: #60a5fa;
  --verde: #22c55e; --verde-bg: rgba(34,197,94,0.16);
  --vermelho: #f87171; --vermelho-bg: rgba(248,113,113,0.16);
  --amarelo: #fbbf24; --amarelo-bg: rgba(251,191,36,0.16);
}
body { font-family: 'Poppins', sans-serif; background: var(--cinza-50); color: var(--cinza-800); min-height: 100vh; }
header { font-family: 'Playfair Display', serif; font-size: 2.2rem; text-align: center; padding: 22px; background: var(--branco); border-bottom: 1px solid var(--cinza-200); }
header a { color: var(--azul-escuro); text-decoration: none; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 30px 3% 100px; }
.painel-header { background: linear-gradient(135deg, var(--azul-escuro), var(--azul)); color: white; border-radius: var(--radius); padding: 26px 32px; margin-bottom: 24px; box-shadow: var(--sombra); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px; }
.painel-header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
.painel-header p { opacity: 0.9; font-size: 0.9rem; margin-top: 4px; }
.card { background: var(--branco); border: 1px solid var(--cinza-200); border-radius: var(--radius); box-shadow: var(--sombra); padding: 24px 26px; margin-bottom: 20px; }
.card h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 14px; }
.btn { padding: 10px 22px; border-radius: 30px; border: none; background: var(--azul); color: white; font-weight: 700; cursor: pointer; font-size: 0.88rem; }
.btn:hover { background: var(--azul-hover); }
.btn.secundario { background: var(--branco); color: var(--cinza-600); border: 1px solid var(--cinza-300); }
.btn.perigo { background: var(--vermelho-bg); color: var(--vermelho); border: 1px solid var(--vermelho); }
.btn.pequeno { padding: 6px 14px; font-size: 0.78rem; }
.voltar-link { display: inline-flex; gap: 6px; color: var(--azul); text-decoration: none; font-weight: 600; font-size: 0.9rem; margin-bottom: 18px; cursor: pointer; }
.vazio-box { text-align: center; padding: 40px 20px; color: var(--cinza-400); }
.conjunto-item { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 16px 20px; border: 1px solid var(--cinza-200); border-radius: 14px; margin-bottom: 10px; flex-wrap: wrap; }
.conjunto-item h4 { font-size: 1rem; }
.conjunto-item .meta { font-size: 0.82rem; color: var(--cinza-400); }
.conjunto-item.inativo { opacity: 0.55; }
.pill { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 10px; border-radius: 10px; background: var(--azul-claro); color: var(--azul-escuro); vertical-align: middle; }
.campo { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.campo label { font-size: 0.8rem; font-weight: 700; color: var(--cinza-600); }
.campo input, .campo select, .campo textarea { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--cinza-300); font-family: 'Poppins', sans-serif; font-size: 0.9rem; background: var(--branco); color: var(--cinza-800); }
.campo textarea { min-height: 60px; resize: vertical; }
.campo-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
.msg-inline { padding: 10px 14px; border-radius: 10px; font-size: 0.86rem; margin-top: 10px; }
.msg-inline.sucesso { background: var(--verde-bg); color: var(--verde); }
.msg-inline.erro { background: var(--vermelho-bg); color: var(--vermelho); }

.picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 800px) { .picker-grid { grid-template-columns: 1fr; } }
.picker-lista { max-height: 420px; overflow-y: auto; border: 1px solid var(--cinza-200); border-radius: 12px; }
.picker-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--cinza-100); font-size: 0.85rem; }
.picker-item .enunciado { flex: 1; }
.picker-item .tags { font-size: 0.72rem; color: var(--cinza-400); }
.selecionadas-lista { max-height: 420px; overflow-y: auto; border: 1px solid var(--cinza-200); border-radius: 12px; }
.selecionada-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--cinza-100); font-size: 0.85rem; }
.selecionada-item .ordem { font-weight: 700; color: var(--azul); min-width: 22px; }
footer { text-align: center; padding: 24px; background: var(--branco); border-top: 1px solid var(--cinza-200); margin-top: 30px; font-size: 0.85rem; color: var(--cinza-400); }
.titulo-icone-inline { width: 1em; height: 1em; object-fit: contain; vertical-align: -0.14em; margin-right: 8px; }
.titulo-icone-inline.pequeno { margin-right: 5px; }
</style>
</head>

<body style="visibility:hidden;">
<script>
(async function protegerPagina() {
  const token = localStorage.getItem('token');
  function bloquear(msg) {
    document.body.innerHTML = `
      <div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; font-family:'Poppins',sans-serif; background:#f8fafc; color:#1e293b;">
        <h1 style="font-family:'Playfair Display',serif; font-size:2.2rem; margin-bottom:16px; color:#1e40af;">Acesso restrito</h1>
        <p style="font-size:1.1rem; max-width:480px; margin-bottom:28px; opacity:0.85;">${msg}</p>
        <a href="login.html" style="padding:14px 28px; background:#2563eb; color:white; border-radius:30px; text-decoration:none; font-weight:700;">Entrar</a>
      </div>`;
    document.body.style.visibility = 'visible';
  }
  if (!token) return bloquear('Esta página é exclusiva para professores e administradores.');
  try {
    const res = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) return bloquear('Sessão expirada. Entre novamente.');
    const data = await res.json();
    if (data.role !== 'professor' && data.role !== 'admin') return bloquear('Esta página é exclusiva para professores e administradores.');
    document.body.style.visibility = 'visible';
  } catch (err) { bloquear('Erro ao verificar sua conta.'); }
})();
</script>

<header><a href="index.html">Francês na Mira <img src="img/logo-mira.png" alt="" class="logo-mira-icone"></a></header>

<div class="wrap">
  <div class="painel-header">
    <div>
      <h1>Conjuntos de Questões</h1>
      <p>Curadoria manual dos conjuntos oficiais da Plataforma de Questões — selecione as questões que compõem cada conjunto.</p>
    </div>
    <a href="minha-conta.html" class="btn secundario"><img class="titulo-icone-inline pequeno" src="img/icones/chevron-left.svg" alt="">Minha Conta</a>
  </div>

  <!-- ===================== LISTA ===================== -->
  <div id="viewLista">
    <div class="card">
      <div style="display:flex; justify-content:flex-end; margin-bottom:14px;">
        <button class="btn" id="novoConjuntoBtn">+ Novo Conjunto Oficial</button>
      </div>
      <div id="conjuntosLista"></div>
    </div>
  </div>

  <!-- ===================== EDITOR ===================== -->
  <div id="viewEditor" style="display:none;">
    <span class="voltar-link" id="voltarListaBtn"><img class="titulo-icone-inline pequeno" src="img/icones/chevron-left.svg" alt="">Voltar à lista</span>
    <div class="card">
      <h2 id="editorTitulo">Novo Conjunto Oficial</h2>
      <div class="campo"><label>Nome</label><input type="text" id="conjuntoNome" placeholder="Ex.: Conjunto 01 — Nível A1"></div>
      <div class="campo"><label>Descrição (opcional)</label><textarea id="conjuntoDescricao"></textarea></div>
      <div class="campo-row">
        <div class="campo"><label>Categoria</label>
          <select id="conjuntoPool">
            <option value="praticar">Praticar</option>
            <option value="simulado">Simulado</option>
          </select>
        </div>
        <div class="campo"><label>Dificuldade</label>
          <select id="conjuntoDificuldade">
            <option value="">Automática (pelo nível das questões)</option>
            <option value="facil">Fácil</option>
            <option value="medio">Médio</option>
            <option value="dificil">Difícil</option>
          </select>
        </div>
        <div class="campo"><label>Tempo limite (minutos, opcional)</label><input type="number" id="conjuntoTempo" min="1" placeholder="Sem limite"></div>
        <div class="campo"><label style="visibility:hidden;">Ativo</label>
          <label style="display:flex; align-items:center; gap:8px; font-size:0.88rem; padding-top:8px;"><input type="checkbox" id="conjuntoAtivo" checked> Ativo (visível aos alunos)</label>
        </div>
      </div>
      <div id="conjuntoErro" class="msg-inline erro" style="display:none;"></div>
    </div>

    <div class="card">
      <h2>Curadoria de questões</h2>
      <div class="picker-grid">
        <div>
          <div class="campo-row" style="margin-bottom:12px;">
            <div class="campo"><label>Nível</label><select id="filtroNivel"><option value="">Todos</option></select></div>
            <div class="campo"><label>Categoria</label><select id="filtroMateria"><option value="">Todas</option></select></div>
          </div>
          <div class="campo"><label>Buscar por texto</label><input type="text" id="filtroBusca" placeholder="Buscar no enunciado..."></div>
          <button class="btn secundario pequeno" id="buscarQuestoesBtn" style="margin-bottom:12px;">Buscar</button>
          <div class="picker-lista" id="pickerLista"></div>
        </div>
        <div>
          <label class="campo" style="font-size:0.8rem; font-weight:700; color:var(--cinza-600); margin-bottom:6px;">Questões selecionadas (<span id="selecionadasCount">0</span>)</label>
          <div class="selecionadas-lista" id="selecionadasLista"></div>
        </div>
      </div>
    </div>

    <div style="display:flex; gap:12px;">
      <button class="btn" id="salvarConjuntoBtn">Salvar Conjunto</button>
      <button class="btn perigo" id="removerConjuntoBtn" style="display:none;">Remover Conjunto</button>
    </div>
  </div>
</div>

<footer>© 2026 · Francês na Mira</footer>

<script src="js/questoesRender.js"></script>
<script src="js/admin-conjuntos.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
