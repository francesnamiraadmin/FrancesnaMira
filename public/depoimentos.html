<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Depoimentos - Francês na Mira</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/app-shell.css">

<style>
html { scroll-behavior: smooth; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; min-height: 100vh; }
footer { text-align: center; padding: 28px; background: var(--footer-bg); margin-top: 20px; color: var(--text-muted); font-size: 0.9rem; }

.campo { margin-bottom: 18px; }
.campo label { display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; }
.campo input, .campo textarea, .campo select {
  width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--glass-border);
  background: var(--glass-input); color: var(--text); font-family: 'Poppins', sans-serif; font-size: 0.95rem;
}
.campo select option { color: var(--accent-text); }
.campo textarea { resize: vertical; min-height: 110px; }
.campo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.estrelas { display: flex; gap: 6px; font-size: 1.8rem; }
.estrelas span { cursor: pointer; color: var(--glass-border-strong); transition: color 0.15s ease; }
.estrelas span.ativa { color: var(--accent); }

.consentimento-box {
  display: flex; gap: 12px; align-items: flex-start; background: var(--glass-bg-2);
  border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px 18px; margin: 20px 0;
}
.consentimento-box input { width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px; accent-color: var(--accent); }
.consentimento-box p { font-size: 0.88rem; line-height: 1.5; }

.foto-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: none; margin-top: 10px; }

.meu-depoimento-item {
  border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px 18px; margin-bottom: 12px;
}
.meu-depoimento-item .cabecalho { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.meu-depoimento-item h4 { font-size: 1rem; }
.meu-depoimento-item .estrelas-view { color: var(--accent); font-size: 0.95rem; }
.meu-depoimento-item p { font-size: 0.9rem; color: var(--text-muted); }

.envio-msg { margin-top: 14px; font-size: 0.9rem; min-height: 1.3em; }
</style>
</head>

<body>

<div id="app-navbar" class="app-navbar-bar"></div>

<div class="dash-header">
  <div class="dash-welcome" data-i18n="depoimentos.titulo">Depoimentos</div>
  <div class="dash-sub" data-i18n="depoimentos.subtitulo">Conte sua experiência com a Francês na Mira</div>
</div>

<div class="dash-container">

  <div class="dash-section-card">
    <h2><img class="titulo-icone-inline" src="img/icones/writing-hand.svg" alt=""><span data-i18n="depoimentos.titulo">Depoimentos</span></h2>

    <div class="campo">
      <label for="tituloInput" data-i18n="depoimentos.tituloCampo">Título</label>
      <input type="text" id="tituloInput" maxlength="80" placeholder="Ex.: Consegui minha aprovação no TCF!">
    </div>

    <div class="campo">
      <label for="textoInput" data-i18n="depoimentos.textoCampo">Seu depoimento</label>
      <textarea id="textoInput" maxlength="1200" placeholder="Conte como foi sua experiência estudando na plataforma..."></textarea>
    </div>

    <div class="campo">
      <label data-i18n="depoimentos.notaCampo">Sua avaliação</label>
      <div class="estrelas" id="estrelasInput">
        <span data-valor="1"><img src="img/icones/star-empty.svg" alt="" style="width:1em; height:1em;"></span><span data-valor="2"><img src="img/icones/star-empty.svg" alt="" style="width:1em; height:1em;"></span><span data-valor="3"><img src="img/icones/star-empty.svg" alt="" style="width:1em; height:1em;"></span><span data-valor="4"><img src="img/icones/star-empty.svg" alt="" style="width:1em; height:1em;"></span><span data-valor="5"><img src="img/icones/star-empty.svg" alt="" style="width:1em; height:1em;"></span>
      </div>
    </div>

    <div class="campo-row">
      <div class="campo">
        <label for="cursoInput" data-i18n="depoimentos.cursoCampo">Curso ou plano</label>
        <select id="cursoInput">
          <option value="">—</option>
          <option>TCF</option><option>TEF</option><option>DELF</option><option>DALF</option>
          <option>A1</option><option>A2</option><option>B1</option><option>B2</option>
          <option>Turmas</option><option>Aulas Especializadas Gravadas</option><option>Pack Prestige</option>
        </select>
      </div>
      <div class="campo">
        <label for="tempoInput" data-i18n="depoimentos.tempoCampo">Há quanto tempo usa a plataforma</label>
        <select id="tempoInput">
          <option value="">—</option>
          <option>Menos de 1 mês</option><option>1 a 3 meses</option><option>3 a 6 meses</option>
          <option>6 meses a 1 ano</option><option>Mais de 1 ano</option>
        </select>
      </div>
    </div>

    <div class="campo">
      <label for="fotoInput" data-i18n="depoimentos.fotoCampo">Foto (opcional)</label>
      <input type="file" id="fotoInput" accept="image/*">
      <img id="fotoPreview" class="foto-preview" alt="Pré-visualização da foto">
    </div>

    <div class="consentimento-box">
      <input type="checkbox" id="consentimentoCheck">
      <p id="consentimentoTexto" data-i18n="depoimentos.consentimento">Autorizo a utilização do meu nome, imagem e depoimento pela plataforma para fins institucionais e promocionais.</p>
    </div>

    <button class="dash-btn" id="enviarBtn" disabled data-i18n="depoimentos.enviar">Enviar depoimento</button>
    <div class="envio-msg" id="envioMsg"></div>
  </div>

  <div class="dash-section-card">
    <h2><img class="titulo-icone-inline" src="img/icones/exercise-list.svg" alt=""><span data-i18n="depoimentos.meusEnvios">Meus depoimentos enviados</span></h2>
    <div id="listaMeusDepoimentos"><div class="skeleton skeleton-line" style="width:100%;"></div></div>
  </div>

</div>

<footer>© 2026 · Francês na Mira</footer>

<script src="js/i18n.js"></script>
<script src="js/theme-toggle.js"></script>
<script src="js/appShell.js"></script>
<script src="js/estudoTimerGlobal.js"></script>
<script>
const token = localStorage.getItem('token');
function authHeaders() { return { Authorization: 'Bearer ' + token }; }
function authHeadersJson() { return { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }; }

let notaEscolhida = 0;
let fotoBase64 = null;

document.querySelectorAll('#estrelasInput span').forEach(estrela => {
  estrela.addEventListener('click', () => {
    notaEscolhida = Number(estrela.dataset.valor);
    document.querySelectorAll('#estrelasInput span').forEach(s => {
      const ativa = Number(s.dataset.valor) <= notaEscolhida;
      s.classList.toggle('ativa', ativa);
      s.querySelector('img').src = `img/icones/${ativa ? 'star-filled' : 'star-empty'}.svg`;
    });
    atualizarBotaoEnvio();
  });
});

document.getElementById('fotoInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const size = 300;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size / img.width, size / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
      fotoBase64 = canvas.toDataURL('image/jpeg', 0.85);
      const preview = document.getElementById('fotoPreview');
      preview.src = fotoBase64;
      preview.style.display = 'block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function atualizarBotaoEnvio() {
  const titulo = document.getElementById('tituloInput').value.trim();
  const texto = document.getElementById('textoInput').value.trim();
  const consentimento = document.getElementById('consentimentoCheck').checked;
  document.getElementById('enviarBtn').disabled = !(titulo && texto && notaEscolhida > 0 && consentimento);
}
['tituloInput', 'textoInput'].forEach(id => document.getElementById(id).addEventListener('input', atualizarBotaoEnvio));
document.getElementById('consentimentoCheck').addEventListener('change', atualizarBotaoEnvio);

document.getElementById('enviarBtn').addEventListener('click', async () => {
  const btn = document.getElementById('enviarBtn');
  const msg = document.getElementById('envioMsg');
  btn.disabled = true;
  msg.style.color = 'var(--text)'; msg.textContent = window.I18n.t('common.enviando');

  try {
    const res = await fetch('/api/depoimentos', {
      method: 'POST', headers: authHeadersJson(),
      body: JSON.stringify({
        titulo: document.getElementById('tituloInput').value.trim(),
        texto: document.getElementById('textoInput').value.trim(),
        nota: notaEscolhida,
        cursoOuPlano: document.getElementById('cursoInput').value,
        tempoUso: document.getElementById('tempoInput').value,
        foto: fotoBase64,
        aceiteImagem: document.getElementById('consentimentoCheck').checked
      })
    });
    const data = await res.json();
    msg.style.color = res.ok ? 'var(--success-text)' : 'var(--danger-text)';
    msg.textContent = data.msg;
    if (res.ok) {
      document.getElementById('tituloInput').value = '';
      document.getElementById('textoInput').value = '';
      document.getElementById('cursoInput').value = '';
      document.getElementById('tempoInput').value = '';
      document.getElementById('consentimentoCheck').checked = false;
      document.getElementById('fotoPreview').style.display = 'none';
      fotoBase64 = null; notaEscolhida = 0;
      document.querySelectorAll('#estrelasInput span').forEach(s => { s.classList.remove('ativa'); s.querySelector('img').src = 'img/icones/star-empty.svg'; });
      carregarMeusDepoimentos();
    }
  } catch (err) {
    msg.style.color = 'var(--danger-text)'; msg.textContent = window.I18n.t('common.erroServidor');
  } finally {
    atualizarBotaoEnvio();
  }
});

const STATUS_INFO = {
  pendente: { classe: 'bloqueado', chave: 'depoimentos.statusPendente', label: 'Aguardando análise' },
  aprovado: { classe: 'ativo', chave: 'depoimentos.statusAprovado', label: 'Aprovado' },
  rejeitado: { classe: 'expirado', chave: 'depoimentos.statusRejeitado', label: 'Rejeitado' }
};

function escapeHtmlDep(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
async function carregarMeusDepoimentos() {
  const alvo = document.getElementById('listaMeusDepoimentos');
  try {
    const res = await fetch('/api/depoimentos/meus', { headers: authHeaders() });
    const depoimentos = await res.json();
    if (!Array.isArray(depoimentos) || depoimentos.length === 0) {
      alvo.innerHTML = '<div class="stats-vazio" style="text-align:center; opacity:0.8; padding:20px;">Você ainda não enviou nenhum depoimento.</div>';
      return;
    }
    alvo.innerHTML = depoimentos.map(d => {
      const info = STATUS_INFO[d.status] || STATUS_INFO.pendente;
      return `<div class="meu-depoimento-item">
        <div class="cabecalho">
          <h4>${escapeHtmlDep(d.titulo)}</h4>
          <span class="dash-status-tag ${info.classe}" data-i18n="${info.chave}">${window.I18n.t(info.chave) === info.chave ? info.label : window.I18n.t(info.chave)}</span>
        </div>
        <div class="estrelas-view">${Array.from({length:5}, (_, i) => `<img src="img/icones/${i < d.nota ? 'star-filled' : 'star-empty'}.svg" alt="" style="width:0.95em; height:0.95em;">`).join('')}</div>
        <p>${escapeHtmlDep(d.texto)}</p>
        <p style="margin-top:6px; font-size:0.78rem;">${new Date(d.criadoEm).toLocaleDateString('pt-BR')}${d.cursoOuPlano ? ' · ' + escapeHtmlDep(d.cursoOuPlano) : ''}</p>
      </div>`;
    }).join('');
  } catch (err) {
    alvo.innerHTML = '<p style="color:var(--danger-text);">Não foi possível carregar seus depoimentos.</p>';
  }
}

document.addEventListener('appshell:ready', () => carregarMeusDepoimentos());
// A lista de status é montada via JS (não tem data-i18n) — recarrega ao
// trocar de idioma para que o texto acompanhe.
document.addEventListener('i18n:aplicado', () => carregarMeusDepoimentos());
</script>

</body>
</html>
