<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Cadastro - Francês na Mira</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    text-align: center;
    padding: 30px;
    background: var(--header-bg);
  }
  header a { color: var(--text); text-decoration: none; }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--glass-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow);
    border-radius: 18px;
    padding: 40px 36px;
  }

  .auth-card h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    margin-bottom: 8px;
    text-align: center;
  }

  .auth-card .subtitle {
    text-align: center;
    opacity: 0.85;
    margin-bottom: 30px;
    font-size: 0.95rem;
  }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 0.9rem; margin-bottom: 6px; font-weight: 600; }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--glass-border-strong);
    background: var(--glass-input);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;
  }
  .field input::placeholder { color: var(--text-muted); }
  .field input:focus { outline: none; border-color: var(--accent); }

  button[type="submit"] {
    width: 100%;
    padding: 13px;
    margin-top: 8px;
    background: var(--accent);
    color: var(--accent-text);
    font-weight: 700;
    font-size: 1rem;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
  }
  button[type="submit"]:hover { background: var(--accent-hover); }

  #msg {
    margin-top: 16px;
    text-align: center;
    font-weight: 600;
    min-height: 20px;
  }

  .switch-link {
    text-align: center;
    margin-top: 22px;
    font-size: 0.95rem;
  }
  .switch-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
  .switch-link a:hover { text-decoration: underline; }

  #resendBtn {
    display: none;
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: var(--glass-input);
    border: 1px solid var(--glass-border-strong);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
  }
  #resendBtn:hover { background: var(--glass-hover); }
  #resendBtn:disabled { opacity: 0.6; cursor: default; }

  .resend-toggle {
    text-align: center;
    margin-top: 16px;
    font-size: 0.85rem;
    opacity: 0.85;
  }
  .resend-toggle a { color: var(--accent); text-decoration: underline; cursor: pointer; }

  #resendBox { display: none; margin-top: 14px; }
  #resendMsg { text-align: center; font-weight: 600; margin-top: 10px; min-height: 18px; }

  footer { text-align: center; padding: 20px; background: var(--footer-bg); font-size: 0.85rem; }
</style>
</head>
<body>

<header><a href="index.html">Francês na Mira <img src="img/logo-mira.png" alt="" class="logo-mira-icone"></a></header>

<main>
  <div class="auth-card">
    <h1>Criar conta</h1>
    <p class="subtitle">Cadastre-se para acessar cursos e correções</p>

    <form id="registerForm">
      <div class="field">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Seu nome completo" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" minlength="6" required>
      </div>
      <div class="field">
        <label for="confirmarSenha">Confirmar senha</label>
        <input type="password" id="confirmarSenha" placeholder="Repita a senha" minlength="6" required>
      </div>
      <button type="submit">Cadastrar</button>
    </form>

    <p id="msg"></p>

    <button type="button" id="resendBtn">Reenviar e-mail de confirmação</button>

    <p class="resend-toggle">Já se cadastrou mas não recebeu o e-mail? <a id="toggleResendBox">Reenviar confirmação</a></p>
    <div id="resendBox">
      <div class="field">
        <label for="resendEmail">Email cadastrado</label>
        <input type="email" id="resendEmail" placeholder="seuemail@exemplo.com">
      </div>
      <button type="button" id="resendBoxBtn">Reenviar e-mail de confirmação</button>
      <p id="resendMsg"></p>
    </div>

    <p class="switch-link">Já tem conta? <a href="login.html">Entrar</a></p>
  </div>
</main>

<footer>© 2026 · Francês na Mira</footer>

<script src="js/main.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
