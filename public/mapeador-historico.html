<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Histórico de Estudos - Francês na Mira</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/app-shell.css">

<style>
html { scroll-behavior: smooth; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; }
:root { --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.45); }

footer { text-align: center; padding: 28px; background: var(--footer-bg); margin-top: 40px; }

.voltar-link { display: inline-flex; gap: 6px; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem; }

.intro { text-align: center; padding: 40px 4% 10px; }
.intro h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; margin-bottom: 10px; }
.intro p { font-size: 1.05rem; opacity: 0.9; max-width: 680px; margin: 0 auto; }

.pagina-wrap { max-width: 900px; margin: 0 auto; padding: 20px 4% 100px; }

.filtros-row { display: flex; flex-wrap: wrap; gap: 10px; margin: 24px 0; }
.filtro-select, .filtro-input {
  padding: 10px 14px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-input);
  color: var(--text); font-family: 'Poppins', sans-serif; font-size: 0.88rem;
}
.filtro-select option { color: var(--accent-text); }
.filtro-busca { flex: 1; min-width: 180px; }

.sessoes-lista { display: flex; flex-direction: column; gap: 12px; }
.sessao-card {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2));
  border: 1px solid var(--glass-border); border-left: 6px solid var(--cor-item, var(--accent));
  border-radius: 14px; padding: 14px 18px; box-shadow: var(--glass-shadow); cursor: pointer;
}
.sessao-card .badges { display: flex; flex-direction: column; gap: 2px; min-width: 160px; }
.sessao-card .materia { font-weight: 700; }
.sessao-card .conteudo { font-size: 0.85rem; opacity: 0.85; }
.sessao-card .data { font-size: 0.82rem; opacity: 0.7; min-width: 140px; }
.sessao-card .duracao { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); margin-left: auto; }
.sessao-card .obs-preview { flex-basis: 100%; font-size: 0.82rem; opacity: 0.75; margin-top: 2px; }

.vazio-msg { text-align: center; opacity: 0.75; padding: 40px 16px; font-size: 0.95rem; }

.app-modal textarea {
  width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--glass-border);
  background: var(--glass-input); color: var(--text); font-family: 'Poppins', sans-serif; min-height: 70px; resize: vertical;
}
.app-modal select {
  width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--glass-border);
  background: var(--glass-input); color: var(--text); font-family: 'Poppins', sans-serif;
}
.app-modal .detalhe-linha { display: flex; justify-content: space-between; font-size: 0.88rem; padding: 6px 0; border-bottom: 1px solid var(--glass-hover); }
.app-modal .app-modal-actions.tres { justify-content: space-between; }
</style>
</head>

<body>
<div id="app-navbar" class="app-navbar-bar"></div>

<section class="intro">
  <a class="voltar-link" href="mapeador-estudos.html">← Mapeador de Estudos</a>
  <h1>📜 Histórico</h1>
  <p>Todas as suas sessões de estudo registradas. Busque, filtre e edite ou apague sessões suas.</p>
</section>

<div class="pagina-wrap">
  <div class="filtros-row">
    <input type="text" class="filtro-input filtro-busca" id="filtroBusca" placeholder="Buscar nas observações...">
    <select class="filtro-select" id="filtroMateria"><option value="">Todas as matérias</option></select>
    <select class="filtro-select" id="filtroConteudo"><option value="">Todos os conteúdos</option></select>
    <select class="filtro-select" id="filtroOrdenar">
      <option value="recentes">Mais recentes</option>
      <option value="antigas">Mais antigas</option>
      <option value="maior">Maior duração</option>
      <option value="menor">Menor duração</option>
    </select>
  </div>

  <div class="sessoes-lista" id="sessoesLista"></div>
</div>

<footer>© 2026 · Francês na Mira</footer>

<div class="app-modal-overlay" id="modalDetalhe">
  <div class="app-modal largo" style="max-width:460px;">
    <h3>Detalhes da sessão</h3>
    <div class="detalhe-linha"><span>Matéria</span><strong id="detalheMateria"></strong></div>
    <div class="detalhe-linha"><span>Conteúdo</span><strong id="detalheConteudo"></strong></div>
    <div class="detalhe-linha"><span>Início</span><strong id="detalheInicio"></strong></div>
    <div class="detalhe-linha"><span>Fim</span><strong id="detalheFim"></strong></div>
    <div class="detalhe-linha"><span>Duração</span><strong id="detalheDuracao"></strong></div>
    <div class="detalhe-linha"><span>Dispositivo</span><strong id="detalheDispositivo"></strong></div>

    <label style="display:block; font-weight:700; font-size:0.85rem; margin:14px 0 6px;">Observações</label>
    <textarea id="editObservacoes"></textarea>

    <p class="erro-msg" id="modalDetalheErro" style="color:var(--danger-text); font-size:0.85rem; margin-top:8px;"></p>
    <div class="app-modal-actions tres">
      <button class="dash-btn secundario" id="btnApagarSessao" type="button" style="background:var(--danger-bg); color:var(--danger-text);">Apagar</button>
      <div style="display:flex; gap:10px;">
        <button class="dash-btn secundario" id="btnFecharDetalhe" type="button">Fechar</button>
        <button class="dash-btn" id="btnSalvarDetalhe" type="button">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script src="js/mapeadorHistorico.js"></script>
<script src="js/appShell.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
