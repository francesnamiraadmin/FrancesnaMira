<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Painel Administrativo - Grade de Horários</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --azul: #2563eb; --azul-escuro: #1e40af; --azul-claro: #eff6ff; --azul-hover: #1d4ed8;
  --cinza-50: #f8fafc; --cinza-100: #f1f5f9; --cinza-200: #e2e8f0; --cinza-300: #cbd5e1;
  --cinza-400: #94a3b8; --cinza-600: #475569; --cinza-800: #1e293b; --branco: #ffffff;
  --verde: #16a34a; --verde-bg: #f0fdf4; --vermelho: #dc2626; --vermelho-bg: #fef2f2;
  --sombra: 0 1px 3px rgba(15,23,42,0.08), 0 8px 24px rgba(15,23,42,0.06); --radius: 16px;
}
[data-theme="dark"] {
  --branco: #1e2433; --cinza-50: #161b28; --cinza-100: #232a3b; --cinza-200: #2d3548;
  --cinza-300: #3a4358; --cinza-400: #4b5568; --cinza-600: #9aa5bd; --cinza-800: #e8ecf5;
  --azul: #3b82f6; --azul-escuro: #2563eb; --azul-claro: rgba(59,130,246,0.18); --azul-hover: #60a5fa;
  --verde: #22c55e; --verde-bg: rgba(34,197,94,0.16); --vermelho: #f87171; --vermelho-bg: rgba(248,113,113,0.16);
}
body { font-family: 'Poppins', sans-serif; background: var(--cinza-50); color: var(--cinza-800); min-height: 100vh; }
header { font-family: 'Playfair Display', serif; font-size: 2.2rem; text-align: center; padding: 22px; background: var(--branco); border-bottom: 1px solid var(--cinza-200); }
header a { color: var(--azul-escuro); text-decoration: none; }
.wrap { max-width: 1320px; margin: 0 auto; padding: 30px 3% 100px; }
.painel-header { background: linear-gradient(135deg, var(--azul-escuro), var(--azul)); color: white; border-radius: var(--radius); padding: 26px 32px; margin-bottom: 24px; box-shadow: var(--sombra); }
.painel-header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
.painel-header p { opacity: 0.9; font-size: 0.9rem; margin-top: 4px; }

.top-tabs { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.top-tab { padding: 10px 22px; border-radius: 30px; border: 1px solid var(--cinza-200); background: var(--branco); color: var(--cinza-600); font-weight: 600; cursor: pointer; font-size: 0.9rem; }
.top-tab.active { background: var(--azul); color: white; border-color: var(--azul); }

.card { background: var(--branco); border: 1px solid var(--cinza-200); border-radius: var(--radius); box-shadow: var(--sombra); padding: 24px 26px; margin-bottom: 20px; }
.card h2 { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 16px; }
.card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 10px; flex-wrap: wrap; }
.card-head h2 { margin-bottom: 0; }

.campo { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.campo label { font-size: 0.8rem; font-weight: 700; color: var(--cinza-600); }
.campo input, .campo select { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--cinza-300); font-family: 'Poppins', sans-serif; font-size: 0.9rem; background: var(--branco); color: var(--cinza-800); }
.campo-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; }

.btn { padding: 11px 24px; border-radius: 30px; border: none; background: var(--azul); color: white; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
.btn:hover { background: var(--azul-hover); }
.btn.secundario { background: var(--branco); color: var(--cinza-600); border: 1px solid var(--cinza-300); }
.btn.perigo { background: var(--vermelho); }
.btn.pequeno { padding: 7px 16px; font-size: 0.82rem; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.field-error { color: var(--vermelho); font-size: 0.85rem; display: none; margin-top: 6px; }

.periodo-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.periodo-tab { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--cinza-300); background: var(--cinza-50); color: var(--cinza-600); font-weight: 600; cursor: pointer; font-size: 0.85rem; }
.periodo-tab.active { background: var(--azul-claro); color: var(--azul-escuro); border-color: var(--azul); }

.grade-wrap { overflow-x: auto; }
table.grade-admin { width: 100%; min-width: 620px; border-collapse: collapse; font-size: 0.82rem; }
table.grade-admin th { background: var(--cinza-100); padding: 8px 4px; text-align: center; font-weight: 700; }
table.grade-admin td.hora-label { padding: 6px 8px; font-weight: 600; color: var(--cinza-600); white-space: nowrap; text-align: right; }
table.grade-admin td.slot-cel { width: 60px; height: 44px; text-align: center; border: 1px solid var(--cinza-200); cursor: pointer; font-weight: 700; vertical-align: middle; }
table.grade-admin td.slot-cel.vazio { background: var(--cinza-50); cursor: default; }
table.grade-admin td.slot-cel.livre { background: var(--verde-bg); color: var(--verde); }
table.grade-admin td.slot-cel.ocupado { background: var(--vermelho-bg); color: var(--vermelho); }
table.grade-admin td.slot-cel.inativo { background: var(--cinza-100); color: var(--cinza-400); opacity: 0.6; }

.vazio-aviso { text-align: center; padding: 30px 10px; color: var(--cinza-400); font-size: 0.9rem; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--branco); border-radius: var(--radius); padding: 28px 30px; max-width: 480px; width: 100%; max-height: 88vh; overflow-y: auto; box-shadow: var(--sombra); }
.modal-box h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 18px; }
.modal-close-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }

.ocupante-item { display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--cinza-200); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.85rem; }
.ocupante-item .info strong { display: block; }
.ocupante-item .info span { color: var(--cinza-400); font-size: 0.78rem; }

footer { text-align: center; padding: 24px; background: var(--branco); border-top: 1px solid var(--cinza-200); margin-top: 30px; font-size: 0.85rem; color: var(--cinza-400); }
</style>
</head>

<body style="visibility:hidden;">
<script>
(async function protegerPagina() {
  const token = localStorage.getItem('token');
  function bloquear(msg) {
    document.body.innerHTML = `
      <div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; font-family:'Poppins',sans-serif; background:#f8fafc; color:#1e293b;">
        <h1 style="font-family:'Playfair Display',serif; font-size:2.2rem; margin-bottom:16px; color:#1e40af;">Acesso restrito</h1>
        <p style="font-size:1.1rem; max-width:480px; margin-bottom:28px; opacity:0.85;">${msg}</p>
        <a href="login.html" style="padding:14px 28px; background:#2563eb; color:white; border-radius:30px; text-decoration:none; font-weight:700;">Entrar</a>
      </div>`;
    document.body.style.visibility = 'visible';
  }
  if (!token) return bloquear('Esta página é exclusiva para administradores.');
  try {
    const res = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) return bloquear('Sessão expirada. Entre novamente.');
    const data = await res.json();
    if (data.role !== 'admin') return bloquear('Esta página é exclusiva para administradores.');
    document.body.style.visibility = 'visible';
  } catch (err) { bloquear('Erro ao verificar sua conta.'); }
})();
</script>

<header><a href="index.html">Francês na Mira <img src="img/logo-mira.png" alt="" class="logo-mira-icone"></a></header>

<div class="wrap">
  <div class="painel-header">
    <h1>Painel Administrativo — Grade de Horários</h1>
    <p>Gerencie os horários disponíveis para Aula Particular e Aula em Turma.</p>
  </div>

  <div class="top-tabs">
    <button class="top-tab active" data-modalidade="particular">Aula Particular</button>
    <button class="top-tab" data-modalidade="turma">Aula em Turma</button>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>Grade semanal</h2>
      <button class="btn pequeno" id="novoHorarioBtn">+ Adicionar horário</button>
    </div>
    <div class="periodo-tabs" id="periodoTabsAdmin">
      <button type="button" class="periodo-tab active" data-periodo="diurno">Diurno</button>
      <button type="button" class="periodo-tab" data-periodo="vespertino">Vespertino</button>
      <button type="button" class="periodo-tab" data-periodo="noturno">Noturno</button>
    </div>
    <div class="grade-wrap">
      <table class="grade-admin" id="gradeAdmin"></table>
    </div>
    <p style="font-size:0.78rem; color:var(--cinza-400); margin-top:10px; display:flex; align-items:center; flex-wrap:wrap; gap:6px;">
      <span style="display:inline-block; width:11px; height:11px; border-radius:3px; background:var(--verde-bg); border:1px solid var(--verde);"></span> Livre ·
      <span style="display:inline-block; width:11px; height:11px; border-radius:3px; background:var(--vermelho-bg); border:1px solid var(--vermelho);"></span> Ocupado (clique para ver quem reservou) ·
      <span style="display:inline-block; width:11px; height:11px; border-radius:3px; background:var(--cinza-100); border:1px solid var(--cinza-300);"></span> Inativo
    </p>
  </div>
</div>

<!-- ===================== MODAL NOVO HORÁRIO ===================== -->
<div class="modal-overlay" id="modalNovoHorario">
  <div class="modal-box">
    <h3>Novo horário</h3>
    <div class="campo">
      <label>Modalidade</label>
      <select id="novoModalidade">
        <option value="particular">Aula Particular</option>
        <option value="turma">Aula em Turma</option>
      </select>
    </div>
    <div class="campo-row">
      <div class="campo">
        <label>Dia da semana</label>
        <select id="novoDiaSemana">
          <option value="1">Segunda</option>
          <option value="2">Terça</option>
          <option value="3">Quarta</option>
          <option value="4">Quinta</option>
          <option value="5">Sexta</option>
          <option value="6">Sábado</option>
          <option value="0">Domingo</option>
        </select>
      </div>
      <div class="campo">
        <label>Período</label>
        <select id="novoPeriodo">
          <option value="diurno">Diurno</option>
          <option value="vespertino">Vespertino</option>
          <option value="noturno">Noturno</option>
        </select>
      </div>
    </div>
    <div class="campo">
      <label>Horário</label>
      <select id="novoHoraInicio"></select>
    </div>
    <div class="campo" id="novoCapacidadeWrap">
      <label>Capacidade máxima (alunos por horário)</label>
      <input type="number" id="novoCapacidade" min="1" value="8">
    </div>
    <p class="field-error" id="novoHorarioErro"></p>
    <div class="modal-close-row">
      <button class="btn secundario" id="fecharNovoHorarioBtn" type="button">Cancelar</button>
      <button class="btn" id="salvarNovoHorarioBtn" type="button">Criar horário</button>
    </div>
  </div>
</div>

<!-- ===================== MODAL DETALHE DO HORÁRIO ===================== -->
<div class="modal-overlay" id="modalDetalheHorario">
  <div class="modal-box">
    <h3 id="detalheTitulo">Horário</h3>
    <div class="campo" id="detalheCapacidadeWrap">
      <label>Capacidade máxima</label>
      <input type="number" id="detalheCapacidade" min="1">
    </div>
    <div class="campo">
      <label><input type="checkbox" id="detalheAtivo"> Horário ativo (visível para os alunos)</label>
    </div>
    <h3 style="margin-top:14px; font-size:1rem;">Alunos neste horário</h3>
    <div id="detalheOcupantes"></div>
    <p class="field-error" id="detalheErro"></p>
    <div class="modal-close-row">
      <button class="btn perigo" id="removerHorarioBtn" type="button">Remover horário</button>
      <button class="btn secundario" id="fecharDetalheBtn" type="button">Fechar</button>
      <button class="btn" id="salvarDetalheBtn" type="button">Salvar</button>
    </div>
  </div>
</div>

<footer>© 2026 · Francês na Mira</footer>

<script src="js/admin-horarios.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
