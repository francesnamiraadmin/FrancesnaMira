<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Personalizar Conjunto - Francês na Mira</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/app-shell.css">

<style>
html { scroll-behavior: smooth; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; }
:root { --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.45); --glass-blur: blur(18px); }

footer { text-align: center; padding: 28px; background: var(--footer-bg); margin-top: 40px; }

.intro { text-align: center; padding: 40px 4% 20px; }
.intro h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; margin-bottom: 10px; }
.intro p { font-size: 1.05rem; opacity: 0.9; max-width: 680px; margin: 0 auto; }

.pagina-wrap { max-width: 900px; margin: 0 auto; padding: 20px 4% 100px; }

.criar-conjunto-card {
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2));
  border: 1px solid var(--glass-border); border-radius: 20px; padding: 26px 28px;
  box-shadow: var(--glass-shadow); max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px;
}
.criar-conjunto-card label.grupo-label { font-weight: 700; font-size: 0.92rem; margin-bottom: 8px; display: block; }
.chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.chip-toggle {
  padding: 8px 16px; border-radius: 20px; border: 1px solid var(--glass-border); background: var(--glass-bg-2);
  color: var(--text); font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.88rem; transition: 0.2s;
}
.chip-toggle.selecionado { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.quantidade-row, .tempo-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.criar-conjunto-card input[type="number"] {
  padding: 10px 14px; border-radius: 10px; border: 1px solid var(--glass-border); background: var(--glass-input);
  color: var(--text); font-family: 'Poppins', sans-serif; width: 100px;
}
.criar-conjunto-erro { color: var(--danger-text); font-size: 0.88rem; display: none; }
.criar-conjunto-erro.show { display: block; }
.conjunto-acoes { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
.q-btn {
  padding: 10px 20px; border-radius: 20px; border: none; background: var(--accent); color: var(--accent-text); font-weight: 700;
  cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.92rem;
}
.q-btn.secundario { background: var(--glass-hover); color: var(--text); border: 1px solid var(--glass-border-strong); }
.q-btn.perigo { background: var(--danger-bg); color: var(--danger-text); }

.meus-personalizados { max-width: 640px; margin: 40px auto 0; }
.meus-personalizados h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 14px; text-align: center; }
.personalizado-item {
  display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2));
  border: 1px solid var(--glass-border); border-radius: 14px; padding: 14px 18px; margin-bottom: 10px;
}
.personalizado-item .info { display: flex; flex-direction: column; gap: 4px; }
.personalizado-item .nome { font-weight: 700; }
.personalizado-item .meta { font-size: 0.82rem; opacity: 0.8; }
.personalizado-item .acoes { display: flex; gap: 8px; flex-wrap: wrap; }
.q-status-pill { font-size: 0.74rem; font-weight: 700; padding: 3px 11px; border-radius: 14px; }
.q-status-pill.nao_iniciado { background: var(--glass-input); color: var(--text-muted); }
.q-status-pill.em_andamento { background: var(--warning-bg); color: var(--warning-text); }
.q-status-pill.concluido { background: var(--success-bg); color: var(--success-text); }
.meus-personalizados-vazio { text-align: center; opacity: 0.75; padding: 10px; font-size: 0.9rem; }
</style>
</head>

<body style="visibility:hidden;">
<script src="js/plataformaGate.js"></script>

<div id="app-navbar" class="app-navbar-bar"></div>

<section class="intro">
  <h1>🎯 Personalize seu Conjunto</h1>
  <p>Escolha níveis, categorias, quantidade de questões e tempo — o sistema monta um conjunto sob medida pra você praticar.</p>
</section>

<div class="pagina-wrap">
  <div class="criar-conjunto-card" id="criarConjuntoForm">
    <div>
      <label class="grupo-label">Níveis</label>
      <div class="chip-grid" id="chipNiveis"></div>
    </div>
    <div>
      <label class="grupo-label">Categorias</label>
      <div class="chip-grid" id="chipMaterias"></div>
    </div>
    <div>
      <label class="grupo-label">Quantidade de questões</label>
      <div class="quantidade-row" id="chipQuantidade"></div>
    </div>
    <div>
      <label class="grupo-label">Tempo</label>
      <div class="tempo-row">
        <label style="display:flex; align-items:center; gap:6px; font-weight:600; font-size:0.9rem;"><input type="radio" name="tempoModo" value="sem" checked> Sem limite de tempo</label>
        <label style="display:flex; align-items:center; gap:6px; font-weight:600; font-size:0.9rem;"><input type="radio" name="tempoModo" value="com"> Tempo limitado</label>
        <input type="number" id="tempoMinutos" min="1" placeholder="minutos" style="display:none;">
      </div>
    </div>
    <p class="criar-conjunto-erro" id="criarConjuntoErro"></p>
    <div class="conjunto-acoes">
      <button class="q-btn" id="gerarConjuntoBtn">Gerar conjunto</button>
    </div>
  </div>

  <div class="meus-personalizados">
    <h2>Meus conjuntos personalizados</h2>
    <div id="meusPersonalizadosLista"><p class="meus-personalizados-vazio">Carregando...</p></div>
  </div>
</div>

<footer>© 2026 · Francês na Mira</footer>

<script src="js/questoesRender.js"></script>
<script src="js/personalizarConjunto.js"></script>
<script src="js/appShell.js"></script>
<script src="js/estudoTimerGlobal.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
