<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Simulados - Francês na Mira</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/app-shell.css">

<style>
html { scroll-behavior: smooth; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; }
:root { --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.45); --glass-blur: blur(18px); }

footer { text-align: center; padding: 28px; background: var(--footer-bg); margin-top: 40px; }

.intro { text-align: center; padding: 40px 4% 20px; }
.intro h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; margin-bottom: 10px; }
.intro p { font-size: 1.05rem; opacity: 0.9; max-width: 680px; margin: 0 auto; }

.pagina-wrap { max-width: 1200px; margin: 0 auto; padding: 20px 4% 100px; }

.conjuntos-toolbar { display: flex; justify-content: center; margin-bottom: 24px; }
.conjuntos-titulo { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 34px 0 16px; text-align: center; }
.conjuntos-titulo:first-of-type { margin-top: 0; }
.conjuntos-vazio { text-align: center; opacity: 0.75; padding: 20px; font-size: 0.95rem; }

.conjuntos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
.conjunto-card {
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2));
  border: 1px solid var(--glass-border); border-radius: 18px; padding: 22px 24px;
  box-shadow: var(--glass-shadow); display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center;
}
.conjunto-card.destaque { border-color: var(--accent); }
.conjunto-card h3 { font-family: 'Playfair Display', serif; font-size: 1.15rem; }
.conjunto-card .conjunto-desc { font-size: 0.88rem; opacity: 0.85; line-height: 1.4; }
.conjunto-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.conjunto-status { font-size: 0.78rem; font-weight: 700; padding: 3px 11px; border-radius: 14px; }
.conjunto-status.nao_iniciado { background: var(--glass-input); color: var(--text-muted); }
.conjunto-status.em_andamento { background: var(--warning-bg); color: var(--warning-text); }
.conjunto-status.concluido { background: var(--success-bg); color: var(--success-text); }
.conjunto-resultado { font-size: 0.88rem; background: var(--recessed); border-radius: 12px; padding: 10px 14px; line-height: 1.6; text-align: center; }
.conjunto-resultado strong { color: var(--accent); }
.conjunto-acoes { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; justify-content: center; }

.q-pill { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 14px; background: var(--glass-input); }
.q-pill.personalizado { background: var(--accent); color: var(--accent-text); }
.q-btn {
  padding: 10px 20px; border-radius: 20px; border: none; background: var(--accent); color: var(--accent-text); font-weight: 700;
  cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.92rem;
}
.q-btn.secundario { background: var(--glass-hover); color: var(--text); border: 1px solid var(--glass-border-strong); }

.criar-conjunto-card {
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2));
  border: 1px solid var(--glass-border); border-radius: 20px; padding: 26px 28px;
  box-shadow: var(--glass-shadow); max-width: 640px; margin: 0 auto 34px; display: flex; flex-direction: column; gap: 18px;
}
.criar-conjunto-card label.grupo-label { font-weight: 700; font-size: 0.92rem; margin-bottom: 8px; display: block; }
.chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.chip-toggle {
  padding: 8px 16px; border-radius: 20px; border: 1px solid var(--glass-border); background: var(--glass-bg-2);
  color: var(--text); font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.88rem; transition: 0.2s;
}
.chip-toggle.selecionado { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.quantidade-row, .tempo-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.criar-conjunto-card input[type="number"] {
  padding: 10px 14px; border-radius: 10px; border: 1px solid var(--glass-border); background: var(--glass-input);
  color: var(--text); font-family: 'Poppins', sans-serif; width: 100px;
}
.criar-conjunto-erro { color: var(--danger-text); font-size: 0.88rem; display: none; }
.criar-conjunto-erro.show { display: block; }
</style>
</head>

<body style="visibility:hidden;">
<script src="js/plataformaGate.js"></script>

<div id="app-navbar" class="app-navbar-bar"></div>

<section class="intro">
  <h1>⏱️ Simulados</h1>
  <p>Simulados cronometrados, em ambiente semelhante às provas oficiais. Você só vê o gabarito ao finalizar — como numa prova real.</p>
</section>

<div class="pagina-wrap">
  <h2 class="conjuntos-titulo">Simulados Sugeridos</h2>
  <div class="conjuntos-grid" id="simuladosPrioritarios"><p class="conjuntos-vazio">Carregando...</p></div>

  <div class="conjuntos-toolbar">
    <button class="q-btn" id="criarSimuladoBtn">+ Gerar simulado personalizado</button>
  </div>
  <div class="criar-conjunto-card" id="criarSimuladoForm" style="display:none;">
    <div>
      <label class="grupo-label">Níveis</label>
      <div class="chip-grid" id="simChipNiveis"></div>
    </div>
    <div>
      <label class="grupo-label">Categorias</label>
      <div class="chip-grid" id="simChipMaterias"></div>
    </div>
    <div>
      <label class="grupo-label">Quantidade de questões</label>
      <div class="quantidade-row" id="simChipQuantidade"></div>
    </div>
    <div>
      <label class="grupo-label">Tempo</label>
      <div class="tempo-row">
        <label style="display:flex; align-items:center; gap:6px; font-weight:600; font-size:0.9rem;"><input type="radio" name="simTempoModo" value="sem"> Sem limite de tempo</label>
        <label style="display:flex; align-items:center; gap:6px; font-weight:600; font-size:0.9rem;"><input type="radio" name="simTempoModo" value="com" checked> Tempo limitado</label>
        <input type="number" id="simTempoMinutos" min="1" placeholder="minutos" value="60">
      </div>
    </div>
    <p class="criar-conjunto-erro" id="criarSimuladoErro"></p>
    <div class="conjunto-acoes">
      <button class="q-btn" id="gerarSimuladoBtn">Gerar simulado</button>
      <button class="q-btn secundario" id="cancelarCriarSimuladoBtn">Cancelar</button>
    </div>
  </div>

  <h2 class="conjuntos-titulo">Simulados Respondidos</h2>
  <div class="conjuntos-grid" id="simuladosRespondidos"></div>
</div>

<footer>© 2026 · Francês na Mira</footer>

<script src="js/questoesRender.js"></script>
<script src="js/conjuntoCard.js"></script>
<script src="js/simulados.js"></script>
<script src="js/appShell.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
