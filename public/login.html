<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Entrar - Francês na Mira</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    text-align: center;
    padding: 30px;
    background: var(--header-bg);
  }
  header a { color: var(--text); text-decoration: none; }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--glass-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow);
    border-radius: 18px;
    padding: 40px 36px;
  }

  .auth-card h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    margin-bottom: 8px;
    text-align: center;
  }

  .auth-card .subtitle {
    text-align: center;
    opacity: 0.85;
    margin-bottom: 30px;
    font-size: 0.95rem;
  }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 0.9rem; margin-bottom: 6px; font-weight: 600; }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--glass-border-strong);
    background: var(--glass-input);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;
  }
  .field input::placeholder { color: var(--text-muted); }
  .field input:focus { outline: none; border-color: var(--accent); }

  button[type="submit"] {
    width: 100%;
    padding: 13px;
    margin-top: 8px;
    background: var(--accent);
    color: var(--accent-text);
    font-weight: 700;
    font-size: 1rem;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
  }
  button[type="submit"]:hover { background: var(--accent-hover); }

  #msgLogin {
    margin-top: 16px;
    text-align: center;
    font-weight: 600;
    min-height: 20px;
  }

  .switch-link {
    text-align: center;
    margin-top: 22px;
    font-size: 0.95rem;
  }
  .switch-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
  .switch-link a:hover { text-decoration: underline; }

  .checkbox-row {
    display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
    margin: -6px 0 18px;
  }
  .checkbox-row input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .checkbox-row label { margin: 0; font-weight: 500; cursor: pointer; }

  .forgot-toggle {
    display: block; text-align: center; margin-top: 14px; font-size: 0.88rem;
    background: none; border: none; color: var(--text-muted); text-decoration: underline;
    cursor: pointer; width: 100%; font-family: 'Poppins', sans-serif;
  }
  .forgot-toggle:hover { color: var(--text); }

  #esqueciBox {
    display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--glass-border);
  }

  footer { text-align: center; padding: 20px; background: var(--footer-bg); font-size: 0.85rem; }
</style>
</head>
<body>

<header><a href="index.html">Francês na Mira <img src="img/logo-mira.png" alt="" class="logo-mira-icone"></a></header>

<main>
  <div class="auth-card">
    <h1>Bem-vindo de volta</h1>
    <p class="subtitle">Entre com sua conta para continuar</p>

    <form id="loginForm">
      <div class="field">
        <label for="emailLogin">Email</label>
        <input type="email" id="emailLogin" placeholder="seuemail@exemplo.com" required>
      </div>
      <div class="field">
        <label for="senhaLogin">Senha</label>
        <input type="password" id="senhaLogin" placeholder="••••••••" required>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="manterConectado">
        <label for="manterConectado">Manter-me conectado</label>
      </div>
      <button type="submit">Entrar</button>
    </form>

    <p id="msgLogin"></p>

    <button type="button" class="forgot-toggle" id="toggleEsqueciBox">Esqueci minha senha</button>
    <div id="esqueciBox">
      <div class="field">
        <label for="esqueciEmail">Digite seu e-mail cadastrado</label>
        <input type="email" id="esqueciEmail" placeholder="seuemail@exemplo.com">
      </div>
      <button type="button" id="esqueciBtn">Enviar link de redefinição</button>
      <p id="esqueciMsg" style="margin-top:12px; text-align:center; font-weight:600; min-height:20px;"></p>
    </div>

    <p class="switch-link">Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
  </div>
</main>

<footer>© 2026 · Francês na Mira</footer>

<script src="js/authStorage.js"></script>
<script src="js/main.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
