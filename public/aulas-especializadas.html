<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Aulas Especializadas - Francês na Mira</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/app-shell.css">

<style>
html { scroll-behavior: smooth; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; }

:root {
  --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
  --glass-blur: blur(18px);
}

header { font-family: 'Playfair Display', serif; font-size: 3.2rem; text-align: center; padding: 30px; background: var(--header-bg); }
header a { color: inherit; text-decoration: none; }

nav {
  position: relative; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
  padding: 18px 40px; background: var(--glass-strong); backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border); width: 100%;
}
.nav-item { position: relative; flex: 1; text-align: center; }
nav a { position: relative; color: var(--text); text-decoration: none; font-weight: 600; padding: 10px 0; display: inline-block; cursor: pointer; transition: color 0.3s ease; }
nav a:hover { color: #3b96ff; }
nav a::after { content: ""; position: absolute; left: 0; bottom: -0.5px; height: 4px; width: 0%; background: var(--accent); transition: width 0.3s ease; }
nav a:hover::after { width: 100%; }
.dropdown {
  position: absolute; top: 100%; left: 50%; transform: translate(-50%, 10px); background: var(--overlay-strong);
  border-radius: 18px; min-width: 240px; opacity: 0; pointer-events: none; transition: 0.3s ease; z-index: 2000;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.dropdown.show { opacity: 1; pointer-events: auto; transform: translate(-50%, 0); }
.dropdown a { padding: 14px 20px; font-size: 1rem; text-align: left; }
.dropdown-cursos { display: flex; gap: 10px; min-width: 190px; padding: 10px 10px; }
.dropdown-cursos .coluna { display: flex; flex-direction: column; }
.dropdown-cursos strong { margin-bottom: 10px; font-weight: 700; color: var(--accent); }
.login { background: var(--accent); color: var(--accent-text); padding: 10px 28px; border-radius: 30px; font-weight: 700; flex: 0 0 auto; margin-left: 20px; }

/* ===================== APP SHELL ===================== */
.app-shell { max-width: 1440px; margin: 0 auto; padding: 26px 3% 100px; display: grid; grid-template-columns: 320px 1fr; gap: 22px; align-items: start; }
@media(max-width: 960px) { .app-shell { grid-template-columns: 1fr; } }

/* ---- SIDEBAR ---- */
.sidebar {
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2)); border: 1px solid var(--glass-border);
  border-radius: 22px; box-shadow: var(--glass-shadow); backdrop-filter: var(--glass-blur);
  padding: 18px; position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow-y: auto;
}
@media(max-width: 960px) { .sidebar { position: static; max-height: none; } }

.busca-wrap { position: relative; margin-bottom: 14px; }
.busca-wrap input {
  width: 100%; padding: 11px 14px; border-radius: 12px; border: 1px solid var(--glass-border-strong);
  background: var(--glass-input); color: var(--text); font-family: 'Poppins', sans-serif; font-size: 0.9rem;
}
.busca-resultados {
  position: absolute; top: 100%; left: 0; right: 0; margin-top: 6px; background: var(--overlay-strong);
  border-radius: 14px; box-shadow: var(--glass-shadow); z-index: 50; overflow: hidden; display: none;
}
.busca-resultados.show { display: block; }
.busca-resultado-item { padding: 10px 14px; cursor: pointer; font-size: 0.88rem; border-bottom: 1px solid var(--glass-border); }
.busca-resultado-item:last-child { border-bottom: none; }
.busca-resultado-item:hover { background: var(--glass-hover); }
.busca-resultado-item .modulo-nome { display: block; font-size: 0.72rem; opacity: 0.7; margin-top: 2px; }

.sidebar-titulo { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

.progresso-geral-mini { margin-bottom: 16px; }
.progresso-geral-mini .rotulo { display: flex; justify-content: space-between; font-size: 0.78rem; opacity: 0.85; margin-bottom: 6px; }
.barra-progresso { height: 8px; border-radius: 6px; background: var(--recessed); overflow: hidden; }
.barra-progresso .preenchimento { height: 100%; background: var(--accent); border-radius: 6px; transition: width 0.4s ease; }

.sidebar-acoes { display: flex; gap: 8px; margin-bottom: 16px; }
.sidebar-acoes button {
  flex: 1; padding: 8px; border-radius: 10px; border: 1px solid var(--glass-border-strong); background: var(--glass-bg);
  color: var(--text); font-size: 0.78rem; font-weight: 600; cursor: pointer;
}
.sidebar-acoes button:hover { background: var(--glass-hover); }
.sidebar-acoes button.tem-novidade { position: relative; }
.badge-novidade {
  position: absolute; top: -6px; right: -6px; background: var(--danger-text); color: white; border-radius: 50%;
  width: 18px; height: 18px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; font-weight: 800;
}

.modulo-item { border-radius: 14px; margin-bottom: 8px; overflow: hidden; border: 1px solid var(--glass-border); }
.modulo-cabecalho { display: flex; align-items: center; gap: 10px; padding: 12px; cursor: pointer; background: var(--glass-bg-2); }
.modulo-cabecalho:hover { background: var(--glass-hover); }
.modulo-item.bloqueado .modulo-cabecalho { cursor: not-allowed; opacity: 0.6; }
.modulo-icone { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; flex-shrink: 0; }
.modulo-info { flex: 1; min-width: 0; }
.modulo-info .titulo { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.modulo-info .meta { font-size: 0.72rem; opacity: 0.75; margin-top: 2px; }
.modulo-info .barra-progresso { margin-top: 6px; }
.modulo-item.expandido .modulo-cabecalho { background: var(--warning-bg); }

/* ---- GRADE DE AULAS (cards com thumbnail) ---- */
.grade-aulas-titulo { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin: 26px 0 16px; }
.grade-aulas-titulo:first-child { margin-top: 0; }
.grade-aulas { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

.aula-card {
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2)); border: 1px solid var(--glass-border);
  border-radius: 18px; box-shadow: var(--glass-shadow); backdrop-filter: var(--glass-blur); overflow: hidden;
  cursor: pointer; transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}
.aula-card:hover { transform: scale(1.03); box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
.aula-card.ativa { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 45%, transparent), var(--glass-shadow); }

.aula-card-thumb { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; background: var(--recessed); }
.aula-card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.aula-card-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.4rem; }

.aula-card-overlay-play {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
  color: #fff; background: rgba(0,0,0,0.28); opacity: 0; transition: opacity 0.25s ease;
}
.aula-card:hover .aula-card-overlay-play { opacity: 1; }

.aula-card-badge-duracao {
  position: absolute; right: 8px; bottom: 8px; background: rgba(0,0,0,0.78); color: #fff;
  font-size: 0.72rem; font-weight: 700; padding: 2px 7px; border-radius: 6px;
}
.aula-card-badge-status {
  position: absolute; left: 8px; top: 8px; width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700;
  background: rgba(0,0,0,0.55); color: #fff;
}
.aula-card-badge-status.assistida { background: var(--success-text); color: #06210f; }
.aula-card-badge-status.andamento { background: var(--warning-text); color: #2b2100; }
.aula-card-badge-novo {
  position: absolute; right: 8px; top: 8px; background: var(--accent); color: var(--accent-text);
  font-size: 0.68rem; font-weight: 800; letter-spacing: 0.3px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px;
}
.aula-card-mini-progresso { position: absolute; left: 0; right: 0; bottom: 0; height: 4px; background: rgba(255,255,255,0.25); }
.aula-card-mini-progresso div { height: 100%; background: var(--accent); }

.aula-card-info { padding: 14px 16px; }
.aula-card-meta { font-size: 0.72rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
.aula-card-titulo { font-weight: 700; font-size: 0.98rem; line-height: 1.3; margin-bottom: 6px; }
.aula-card-desc {
  font-size: 0.82rem; opacity: 0.8; line-height: 1.4; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

@media (max-width: 480px) {
  .grade-aulas { grid-template-columns: 1fr; gap: 16px; }
}

/* ---- CONTEÚDO PRINCIPAL ---- */
.conteudo-principal { min-width: 0; }

.topo-progresso {
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2)); border: 1px solid var(--glass-border);
  border-radius: 20px; box-shadow: var(--glass-shadow); backdrop-filter: var(--glass-blur);
  padding: 18px 22px; margin-bottom: 18px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
}
.topo-progresso .anel { flex: 1; min-width: 220px; }
.topo-progresso .anel .rotulo { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; }
.topo-progresso .continuar { flex-shrink: 0; }
.topo-progresso .continuar a {
  display: inline-block; padding: 10px 20px; background: var(--accent); color: var(--accent-text);
  border-radius: 30px; font-weight: 700; text-decoration: none; font-size: 0.85rem;
}

.card-vazio {
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2)); border: 1px solid var(--glass-border);
  border-radius: 20px; box-shadow: var(--glass-shadow); backdrop-filter: var(--glass-blur);
  padding: 60px 30px; text-align: center; opacity: 0.85;
}

.aula-card-principal {
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2)); border: 1px solid var(--glass-border);
  border-radius: 22px; box-shadow: var(--glass-shadow); backdrop-filter: var(--glass-blur); overflow: hidden;
}
.player-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
.player-wrap iframe, .player-wrap video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.player-vazio { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: white; opacity: 0.7; font-size: 0.95rem; }

.aula-corpo { padding: 26px 28px; }
.aula-corpo .cabecalho-aula { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.aula-corpo h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; }
.aula-corpo .descricao { opacity: 0.9; line-height: 1.6; margin-bottom: 18px; }

.botoes-acao-aula { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.btn-concluir {
  padding: 11px 22px; border-radius: 30px; border: none; background: var(--accent); color: var(--accent-text);
  font-weight: 700; cursor: pointer; font-size: 0.9rem;
}
.btn-concluir.concluida { background: var(--success-bg); color: var(--success-text); }
.btn-favoritar {
  padding: 11px 18px; border-radius: 30px; border: 1px solid var(--glass-border-strong); background: var(--glass-bg);
  color: var(--text); cursor: pointer; font-size: 0.9rem;
}
.btn-favoritar.favoritada { border-color: var(--accent); color: var(--accent); }

.observacoes-professor {
  background: var(--warning-bg); border: 1px solid var(--warning-border); border-radius: 14px;
  padding: 16px 18px; margin-bottom: 20px; font-size: 0.92rem; line-height: 1.6;
}
.observacoes-professor strong { color: var(--accent); display: block; margin-bottom: 4px; }

.materiais-secao h2, .aula-corpo h2 { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 12px; }
.material-item-aluno {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid var(--glass-border);
  border-radius: 12px; margin-bottom: 8px; text-decoration: none; color: var(--text); cursor: pointer;
}
.material-item-aluno:hover { background: var(--glass-hover); }
.material-item-aluno .icone { font-size: 1.3rem; }
.material-item-aluno .nome { font-weight: 600; font-size: 0.9rem; }
.material-item-aluno .tipo { font-size: 0.75rem; opacity: 0.7; }

.navegacao-aulas { display: flex; justify-content: space-between; gap: 10px; padding: 20px 28px; border-top: 1px solid var(--glass-border); }
.navegacao-aulas button {
  padding: 10px 18px; border-radius: 30px; border: 1px solid var(--glass-border-strong); background: var(--glass-bg);
  color: var(--text); cursor: pointer; font-size: 0.85rem;
}
.navegacao-aulas button:disabled { opacity: 0.4; cursor: not-allowed; }
.navegacao-aulas button:not(:disabled):hover { background: var(--glass-hover); }

/* ---- LISTAS (favoritos / histórico) ---- */
.lista-simples-item {
  display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 14px; border: 1px solid var(--glass-border);
  margin-bottom: 10px; cursor: pointer; background: var(--glass-bg-2);
}
.lista-simples-item:hover { background: var(--glass-hover); }
.lista-simples-item .icone { font-size: 1.4rem; }
.lista-simples-item .info { flex: 1; }
.lista-simples-item .titulo { font-weight: 700; font-size: 0.92rem; }
.lista-simples-item .meta { font-size: 0.76rem; opacity: 0.7; margin-top: 2px; }

/* ---- CERTIFICADO ---- */
.certificado-banner {
  background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: var(--accent-text);
  border-radius: 20px; padding: 20px 26px; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap; box-shadow: var(--glass-shadow);
}
.certificado-banner button {
  padding: 10px 22px; border-radius: 30px; border: none; background: var(--accent-text); color: var(--accent);
  font-weight: 700; cursor: pointer;
}
.certificado-box {
  background: var(--overlay-strong); border: 8px double var(--accent); border-radius: 12px; padding: 60px 40px;
  text-align: center; max-width: 760px; margin: 0 auto;
}
.certificado-box .selo { font-size: 3rem; margin-bottom: 14px; }
.certificado-box h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; opacity: 0.75; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; color: var(--text); }
.certificado-box .nome-aluno { font-family: 'Playfair Display', serif; font-size: 2.4rem; margin-bottom: 20px; color: var(--text); }
.certificado-box p { font-size: 1.05rem; line-height: 1.7; opacity: 0.9; margin-bottom: 6px; color: var(--text); }
.certificado-box .data { margin-top: 24px; font-size: 0.9rem; opacity: 0.7; color: var(--text); }
.btn-imprimir { display: block; margin: 26px auto 0; padding: 12px 28px; border-radius: 30px; border: none; background: var(--accent); color: var(--accent-text); font-weight: 700; cursor: pointer; }

@media print {
  header, nav, .sidebar, .topo-progresso, .voltar-certificado, footer, #themeToggleBtn, .btn-imprimir { display: none !important; }
  .app-shell { display: block; padding: 0; }
  .certificado-box { border-width: 4px; }
}

footer { text-align: center; padding: 28px; background: var(--footer-bg); margin-top: 40px; }
</style>
</head>

<body style="visibility:hidden;">
<script>
(async function protegerPagina() {
  const featureKey = 'gravado';
  const token = localStorage.getItem('token');

  function bloquear() {
    document.body.innerHTML = `
      <div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; font-family:'Poppins',sans-serif; background:var(--bg-gradient); color:var(--text);">
        <h1 style="font-family:'Playfair Display',serif; font-size:2.5rem; margin-bottom:16px;">Conteúdo exclusivo</h1>
        <p style="font-size:1.2rem; max-width:520px; margin-bottom:28px; opacity:0.95;">As aulas especializadas são liberadas a partir do plano Avancé. Entre na sua conta ou assine um plano que inclua este recurso para continuar.</p>
        <div style="display:flex; gap:16px; flex-wrap:wrap; justify-content:center;">
          <a href="login.html" style="padding:14px 28px; background:var(--glass-strong); border:1px solid var(--glass-border-strong); border-radius:30px; color:var(--text); text-decoration:none; font-weight:700;">Entrar</a>
          <a href="cursos.html" style="padding:14px 28px; background:var(--accent); color:var(--accent-text); border-radius:30px; text-decoration:none; font-weight:700;">Ver planos</a>
        </div>
      </div>`;
    document.body.style.visibility = 'visible';
  }

  if (!token) return bloquear();

  try {
    const res = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) return bloquear();
    const data = await res.json();
    const tier = data.plano && data.plano.tier;
    const ativo = data.plano && data.plano.ativo;
    // Liberado pelo plano de curso (cascata por tier) OU por uma compra avulsa do Pack
    // Prestige (Plataforma de Questões / Ambiente de Produção Oral e Textual / Aulas
    // Especializadas Online) — os dois caminhos são independentes.
    const entitlementsCurso = {
      correcoes: !!ativo && ['Essentiel', 'Avancé', 'Excellence'].includes(tier),
      gravado: !!ativo && ['Avancé', 'Excellence'].includes(tier),
      plataforma: !!ativo && tier === 'Excellence'
    };
    const avulsos = data.produtosAvulsos || {};
    const entitlementsAvulso = {
      correcoes: !!avulsos.producao?.ativo,
      gravado: !!avulsos.aulasEspecializadas?.ativo,
      plataforma: !!avulsos.plataforma?.ativo
    };
    if (!(entitlementsCurso[featureKey] || entitlementsAvulso[featureKey])) return bloquear();
    window.__nomeUsuario = data.nome;
    document.body.style.visibility = 'visible';
  } catch (err) {
    bloquear();
  }
})();
</script>

<script>
document.querySelectorAll('.nav-item').forEach(item => {
  const dropdown = item.querySelector('.dropdown');
  if (!dropdown) return;
  let timeout;
  item.addEventListener('mouseenter', () => { clearTimeout(timeout); dropdown.classList.add('show'); });
  item.addEventListener('mouseleave', () => { timeout = setTimeout(() => { dropdown.classList.remove('show'); }, 150); });
});
</script>
