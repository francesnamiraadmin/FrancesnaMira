<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Estatísticas - Francês na Mira</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/app-shell.css">
<link rel="stylesheet" href="css/plataforma-topicos-nav.css">

<style>
html { scroll-behavior: smooth; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; }

footer { text-align: center; padding: 28px; background: var(--footer-bg); margin-top: 40px; }

.intro { text-align: center; padding: 40px 4% 20px; }
.intro h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; margin-bottom: 10px; }
.intro p { font-size: 1.05rem; opacity: 0.9; max-width: 680px; margin: 0 auto; }

.pagina-wrap { max-width: 1100px; margin: 0 auto; padding: 20px 4% 100px; }
.conjuntos-titulo { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 34px 0 16px; text-align: center; }
.stats-vazio { text-align: center; opacity: 0.8; padding: 24px 16px; font-size: 0.95rem; }

.stats-filtros { display: flex; justify-content: center; gap: 12px; margin: 24px 0; flex-wrap: wrap; }
.filtro-select {
  padding: 10px 16px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-input);
  color: var(--text); font-family: 'Poppins', sans-serif; font-size: 0.92rem;
}
.filtro-select option { color: var(--accent-text); }

.stats-grid-2col { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
.chart-card {
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2));
  border: 1px solid var(--glass-border); border-radius: 18px; padding: 22px 24px; box-shadow: var(--glass-shadow);
}
.chart-card h3 { font-size: 1rem; margin-bottom: 14px; text-align: center; }
.chart-scroll { width: 100%; overflow-x: auto; }

.bar-list-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.bar-list-label { flex: 0 0 170px; font-size: 0.88rem; }
.bar-list-track { flex: 1; height: 14px; background: var(--glass-bg); border-radius: 7px; overflow: hidden; }
.bar-list-fill { height: 100%; background: var(--accent); border-radius: 7px; }
.bar-list-val { flex: 0 0 90px; text-align: right; font-size: 0.85rem; opacity: 0.9; }

.dash-atividade-item {
  display: flex; justify-content: space-between; gap: 10px; padding: 12px 16px;
  border-bottom: 1px solid var(--glass-hover); font-size: 0.88rem;
  background: var(--glass-bg-2); border-radius: 10px; margin-bottom: 8px;
}

@media (max-width: 700px) {
  .bar-list-label { flex-basis: 110px; }
  .dash-atividade-item { flex-direction: column; gap: 4px; }
}
</style>
</head>

<body style="visibility:hidden;">
<script src="js/plataformaGate.js"></script>

<div id="app-navbar" class="app-navbar-bar"></div>
<div id="plataformaTopicosNav" class="plataforma-topicos-nav"></div>

<section class="intro">
  <h1>📊 Estatísticas</h1>
  <p>Gráficos, desempenho, evolução e histórico completo da Plataforma de Questões.</p>
</section>

<div class="pagina-wrap">
  <div class="dash-kpi-row" id="kpiRow"></div>

  <div class="stats-filtros">
    <label for="filtroConjunto" style="font-weight:700; font-size:0.9rem; align-self:center;">Ver:</label>
    <select class="filtro-select" id="filtroConjunto"><option value="">Toda a plataforma</option></select>
  </div>

  <div class="stats-grid-2col">
    <div class="chart-card">
      <h3>Corretas vs Incorretas</h3>
      <div id="pizzaWrap" style="display:flex; justify-content:center;"></div>
    </div>
    <div class="chart-card">
      <h3>Desempenho por categoria</h3>
      <div id="barrasCategoria"></div>
    </div>
  </div>

  <div class="chart-card">
    <h3>Evolução ao longo do tempo</h3>
    <div class="chart-scroll" id="evolucaoWrap"></div>
  </div>

  <h2 class="conjuntos-titulo">Histórico de tentativas</h2>
  <div id="historicoTabela"></div>
</div>

<footer>© 2026 · Francês na Mira</footer>

<script src="js/questoesRender.js"></script>
<script src="js/chartsSvg.js"></script>
<script src="js/plataformaTopicosNav.js"></script>
<script src="js/estatisticasQuestoes.js"></script>
<script src="js/appShell.js"></script>
<script src="js/estudoTimerGlobal.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
