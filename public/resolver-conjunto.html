<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-mira.png">
<title>Resolver Conjunto - Francês na Mira</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/app-shell.css">

<style>
html { scroll-behavior: smooth; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; }
:root { --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.45); --glass-blur: blur(18px); }

header.app-header { font-family: 'Playfair Display', serif; font-size: 1.6rem; text-align: center; padding: 20px; background: var(--header-bg); }
footer { text-align: center; padding: 28px; background: var(--footer-bg); margin-top: 40px; }

.resolver-wrap { max-width: 1100px; margin: 0 auto; padding: 24px 4% 100px; }

.resolver-header {
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px;
  background: var(--glass-bg-2); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px 22px; margin-bottom: 22px;
}
.resolver-header h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
.resolver-timer { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
.resolver-timer.alerta { color: var(--danger-text); }

.resolver-layout { display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: start; }
@media (max-width: 800px) { .resolver-layout { grid-template-columns: 1fr; } }

.qnav-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; background: var(--glass-bg-2); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px; }
@media (max-width: 800px) { .qnav-grid { grid-template-columns: repeat(10, 1fr); } }
.qnav-btn {
  aspect-ratio: 1; border-radius: 10px; border: 1px solid var(--glass-border); background: var(--glass-bg);
  color: var(--text); font-weight: 700; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.85rem; position: relative;
}
.qnav-btn.respondida { background: var(--success-bg); border-color: var(--success-text); color: var(--success-text); }
.qnav-btn.marcada::after { content: '★'; position: absolute; top: -6px; right: -4px; font-size: 0.7rem; color: var(--accent); }
.qnav-btn.atual { outline: 3px solid var(--accent); }
.qnav-legenda { font-size: 0.78rem; opacity: 0.85; margin-top: 12px; line-height: 1.6; }

.q-card {
  background: linear-gradient(145deg, var(--glass-bg), var(--glass-bg-2));
  border: 1px solid var(--glass-border); border-radius: 18px; padding: 22px 24px; box-shadow: var(--glass-shadow);
}
.q-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.q-tags { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.q-tag { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.75; font-weight: 700; }
.q-pill { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 14px; background: var(--glass-input); }
.q-status { font-size: 0.85rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
.q-status.correta { background: var(--success-bg); color: var(--success-text); }
.q-status.incorreta { background: var(--danger-bg); color: var(--danger-text); }

.q-texto { font-size: 0.98rem; line-height: 1.65; margin-bottom: 14px; padding: 14px 16px; background: var(--recessed); border-radius: 12px; border-left: 3px solid var(--glass-border-strong); font-style: italic; opacity: 0.95; }
.q-imagem { display: flex; justify-content: center; margin-bottom: 16px; padding: 18px; background: var(--recessed); border-radius: 14px; }
.preco-card { display: flex; flex-direction: column; align-items: center; gap: 8px; background: linear-gradient(145deg, #fff7d6, #ffe9a8); color: #5a3d00; border-radius: 14px; padding: 20px 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); position: relative; }
.preco-card::before { content: ""; position: absolute; left: -8px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; background: rgba(0,0,0,0.2); border-radius: 50%; }
.preco-icone { font-size: 2.6rem; }
.preco-valor { font-size: 1.3rem; font-weight: 700; }
.calendario-card { display: flex; flex-direction: column; align-items: center; background: #fff; color: #08203e; border-radius: 14px; overflow: hidden; min-width: 140px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
.cal-mes { width: 100%; text-align: center; background: #ff5252; color: white; font-weight: 700; padding: 8px 0; text-transform: uppercase; font-size: 0.9rem; }
.cal-dia { font-size: 3rem; font-weight: 700; padding: 10px 0 0; }
.cal-semana { padding: 4px 0 14px; font-weight: 600; opacity: 0.8; }
.contagem-grid { display: flex; flex-wrap: wrap; gap: 10px; max-width: 320px; justify-content: center; align-items: center; }
.contagem-grid span { font-size: 2.2rem; line-height: 1; }
.q-enunciado { font-size: 1.15rem; line-height: 1.6; margin-bottom: 16px; }
.q-audio-btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: var(--warning-bg);
  border: 1px solid var(--accent); color: var(--accent); border-radius: 30px; cursor: pointer; font-weight: 700; margin-bottom: 16px;
  font-family: 'Poppins', sans-serif; font-size: 0.95rem;
}

.q-opcoes { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.q-opcao {
  text-align: left; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--glass-border);
  background: var(--glass-bg-2); color: var(--text); cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.98rem; transition: 0.2s;
}
.q-opcao:hover:not(:disabled) { background: var(--glass-hover); }
.q-opcao.selecionada { border-color: var(--accent); background: var(--warning-bg); }
.q-opcao.certa { border-color: var(--success-text); background: var(--success-bg); }
.q-opcao.errada { border-color: var(--danger-text); background: var(--danger-bg); }
.q-opcao:disabled { cursor: default; }

.q-vf-btns { display: flex; gap: 12px; margin-bottom: 16px; }
.q-vf-btns button {
  flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-bg-2);
  color: var(--text); font-weight: 700; cursor: pointer; font-family: 'Poppins', sans-serif;
}
.q-vf-btns button.selecionada { border-color: var(--accent); background: var(--warning-bg); }
.q-vf-btns button.certa { border-color: var(--success-text); background: var(--success-bg); }
.q-vf-btns button.errada { border-color: var(--danger-text); background: var(--danger-bg); }
.q-vf-btns button:disabled { cursor: default; }

.q-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
.q-btn {
  padding: 10px 20px; border-radius: 20px; border: none; background: var(--accent); color: var(--accent-text); font-weight: 700;
  cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.92rem;
}
.q-btn.secundario { background: var(--glass-hover); color: var(--text); border: 1px solid var(--glass-border-strong); }
.q-btn.ativo { background: var(--warning-bg); color: var(--accent); border: 1px solid var(--accent); }
.q-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.q-gabarito { margin-top: 14px; padding: 14px 16px; background: var(--recessed); border-radius: 12px; font-size: 0.95rem; line-height: 1.6; border-left: 3px solid var(--accent); }

.resolver-rodape { display: flex; justify-content: space-between; margin-top: 20px; gap: 14px; flex-wrap: wrap; }
.resolver-aviso { background: var(--danger-bg); color: var(--danger-text); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.9rem; }

.resultado-resumo { text-align: center; margin-bottom: 30px; }
.resultado-resumo .nota { font-family: 'Playfair Display', serif; font-size: 3.2rem; color: var(--accent); margin: 10px 0; }
.resultado-lista { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>

<body style="visibility:hidden;">
<script src="js/plataformaGate.js"></script>

<div id="app-navbar" class="app-navbar-bar"></div>

<div class="resolver-wrap" id="resolverWrap">
  <p style="text-align:center; opacity:0.8; padding:40px;">Carregando...</p>
</div>

<footer>© 2026 · Francês na Mira</footer>

<script src="js/questoesRender.js"></script>
<script src="js/resolverConjunto.js"></script>
<script src="js/appShell.js"></script>
<script src="js/estudoTimerGlobal.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
